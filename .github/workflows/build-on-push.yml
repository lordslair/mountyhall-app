# This workflow will install Python dependencies, run tests with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Application build (push)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [ "backend", "frontend" ]
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1. Setup QEMU (The translator for ARM64)
      - name: Set up QEMU 🔧
        uses: docker/setup-qemu-action@v3

      # 2. Setup Buildx (The tool that manages multi-arch)
      - name: Set up Docker Buildx 🔧
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub (Store your credentials in GitHub Secrets)
      - name: Log in to Docker Hub 🔐
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extracting Metadata 🔧
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/mountyhapp-${{ matrix.app }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=edge

      # 4. Build and Push
      - name: Build 🏗️ & Push to Docker Hub 🚀
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          file: ./${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
